# ⬇️ אחרי יצירת ה-repo בגיטהאב, החליפו את השורה הבאה לשם המשתמש/repo שלכם:
backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/sharon-sagie-site
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"
locale: he

collections:
  # ---------- פרויקטים / המלצות / תמונות עמוד הבית ----------
  - name: data
    label: "פרויקטים, המלצות ותמונות"
    files:
      - name: content
        label: "פרויקטים · המלצות · תמונות ראש הדף"
        file: "src/data/content.json"
        fields:
          - name: projects
            label: "פרויקטים"
            label_singular: "פרויקט"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: slug, label: "מזהה (אנגלית, ללא רווחים)", widget: string }
              - { name: title, label: "שם הפרויקט", widget: string }
              - { name: tag, label: "סוג (למשל: בית פרטי)", widget: string }
              - { name: location, label: "מיקום", widget: string }
              - { name: year, label: "שנה", widget: string }
              - { name: summary, label: "תקציר", widget: text }
              - { name: challenge, label: "האתגר", widget: text }
              - { name: body, label: "תיאור הפרויקט", widget: text }
              - name: images
                label: "תמונות — גררו לשינוי סדר, התמונה הראשונה היא השער"
                label_singular: "תמונה"
                widget: list
                field: { name: image, label: "תמונה", widget: image }
          - name: heroImages
            label: "תמונות מתחלפות בראש עמוד הבית"
            label_singular: "תמונה"
            widget: list
            field: { name: image, label: "תמונה", widget: image }
          - name: testimonials
            label: "המלצות"
            label_singular: "המלצה"
            widget: list
            summary: "{{fields.who}}"
            fields:
              - { name: quote, label: "ההמלצה", widget: text }
              - { name: who, label: "שם הממליץ", widget: string }
              - { name: where, label: "מיקום / פרויקט", widget: string }

  # ---------- כל הטקסטים באתר ----------
  - name: copy
    label: "טקסטים באתר"
    files:
      - name: site
        label: "כל הטקסטים"
        file: "src/data/site.json"
        fields:
          - name: hero
            label: "ראש עמוד הבית"
            widget: object
            fields:
              - { name: eyebrow, label: "כותרת קטנה", widget: string }
              - { name: title, label: "כותרת ראשית (Enter = שורה חדשה)", widget: text }
              - { name: cta, label: "כפתור", widget: string }
          - { name: philosophy, label: "ציטוט הפילוסופיה", widget: text }
          - name: homeAbout
            label: "מקטע 'קצת עליי' (עמוד הבית)"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת (Enter = שורה חדשה)" }
              - { name: lead, widget: text, label: "טקסט" }
              - { name: cta, widget: string, label: "כפתור" }
          - name: homeServices
            label: "מקטע 'איך עובדים יחד' (עמוד הבית)"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת" }
              - { name: lead, widget: text, label: "טקסט" }
              - { name: cta, widget: string, label: "כפתור" }
          - name: homeContact
            label: "מקטע צור קשר (עמוד הבית)"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת" }
              - { name: lead, widget: text, label: "טקסט" }
              - { name: cta, widget: string, label: "כפתור" }
          - name: about
            label: "עמוד אודות"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת (Enter = שורה חדשה)" }
              - { name: lead, widget: text, label: "פתיח" }
              - name: paragraphs
                label: "פסקאות הסיפור"
                widget: list
                field: { name: text, label: "פסקה", widget: text }
              - name: values
                label: "ערכים"
                widget: list
                fields:
                  - { name: n, label: "ערך", widget: string }
                  - { name: t, label: "תיאור", widget: string }
              - { name: processEyebrow, widget: string, label: "כותרת קטנה - תהליך" }
              - { name: processTitle, widget: string, label: "כותרת התהליך" }
              - name: steps
                label: "שלבי התהליך"
                widget: list
                fields:
                  - { name: n, label: "מספר", widget: string }
                  - { name: h, label: "כותרת", widget: string }
                  - { name: p, label: "תיאור", widget: text }
              - { name: endTitle, widget: string, label: "כותרת סיום" }
              - { name: endCta, widget: string, label: "כפתור סיום" }
          - name: services
            label: "עמוד ייעוץ"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת" }
              - { name: lead, widget: text, label: "פתיח" }
              - name: modes
                label: "מסלולי ליווי"
                widget: list
                fields:
                  - { name: t, label: "כותרת", widget: string }
                  - { name: p, label: "תיאור", widget: text }
              - { name: tracksEyebrow, widget: string, label: "כותרת קטנה - מסלולים" }
              - { name: tracksTitle, widget: string, label: "כותרת המסלולים" }
              - name: tracks
                label: "מסלולי ייעוץ + מחירים"
                widget: list
                fields:
                  - { name: name, label: "שם המסלול", widget: string }
                  - { name: price, label: "מחיר", widget: string }
                  - { name: strike, label: "מחיר לפני הנחה (לא חובה)", widget: string, required: false }
                  - { name: body, label: "תיאור", widget: text }
                  - { name: note, label: "הערה", widget: text }
                  - { name: featured, label: "להדגיש?", widget: boolean, default: false }
              - name: why
                label: "למה כדאי"
                widget: list
                fields:
                  - { name: n, label: "מספר", widget: string }
                  - { name: t, label: "טקסט", widget: string }
              - { name: cta, widget: string, label: "כפתור" }
          - name: contact
            label: "עמוד צור קשר"
            widget: object
            fields:
              - { name: eyebrow, widget: string, label: "כותרת קטנה" }
              - { name: title, widget: text, label: "כותרת" }
              - { name: lead, widget: text, label: "טקסט" }
              - name: methods
                label: "דרכי יצירת קשר"
                widget: list
                fields:
                  - { name: label, label: "כותרת", widget: string }
                  - { name: value, label: "ערך", widget: string }
                  - { name: href, label: "קישור (לא חובה)", widget: string, required: false }
